<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auditor por Categoría - Yesica</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background: #f0f2f5; padding: 20px; display: flex; justify-content: center; }
        .card { background: white; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 400px; padding: 25px; }
        h2 { color: #1a73e8; text-align: center; font-size: 1.1rem; margin-bottom: 20px; }
        label { display: block; font-weight: 600; margin-top: 15px; font-size: 0.8rem; color: #555; }
        input, select { width: 100%; padding: 12px; border: 2px solid #e1e4e8; border-radius: 10px; box-sizing: border-box; font-size: 16px; margin-top: 5px; }
        button { width: 100%; background: #1a73e8; color: white; padding: 18px; border: none; border-radius: 12px; font-weight: 700; margin-top: 25px; cursor: pointer; }
        .results { margin-top: 20px; border-top: 2px solid #eee; padding-top: 15px; display: none; }
        .row { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 0.9rem; }
        .total { font-size: 1.2rem; color: #d63384; font-weight: 800; margin-top: 10px; border-top: 1px solid #eee; padding-top: 10px; }
    </style>
</head>
<body>

<div class="card">
    <h2>AUDITORIA TRANS-AUTO</h2>
    
    <label>Valor CIF (Factura + Flete):</label>
    <input type="number" id="cif" placeholder="Ej: 9290">

    <label>Selecciona Tipo de Carro:</label>
    <select id="tipo">
        <option value="0.20|0.05464">Automóvil Menor 1300 cc (20% DAI)</option>
        <option value="0.25|0.05690">Automóvil Mayor 1300 cc (25% DAI)</option>
        <option value="0.30|0.05916">Automóvil Mayor 2000 cc (30% DAI)</option>
        <option value="0.30|0.08875">Automóvil Mayor 2000 cc AWD (30% DAI)</option>
    </select>

    <button onclick="auditar()">COMPARAR RESULTADO</button>

    <div id="res" class="results">
        <div class="row"><span>DAI:</span> <b id="rD"></b></div>
        <div class="row"><span>IVA (13%):</span> <b id="rV"></b></div>
        <div class="row"><span>AIV (1%):</span> <b id="rA"></b></div>
        <div class="row"><span>Matrícula:</span> <b id="rM" style="color: blue;"></b></div>
        <div class="row"><span>P.E. / Otros:</span> <b>$40.00</b></div>
        <div class="total" id="rT"></div>
    </div>
</div>

<script>
function auditar() {
    const cif = parseFloat(document.getElementById('cif').value);
    const config = document.getElementById('tipo').value.split('|');
    if(!cif) return;

    const daiPct = parseFloat(config[0]);
    const matFactor = parseFloat(config[1]);

    // Fórmulas validadas con tus fotos
    const dai = Math.round(cif * daiPct * 100) / 100;
    const iva = Math.round((cif + dai) * 0.13 * 100) / 100;
    const aiv = Math.round(cif * 0.01 * 100) / 100;
    const mat = Math.round(cif * matFactor * 100) / 100;
    
    const total = dai + iva + aiv + mat + 40;

    document.getElementById('rD').textContent = "$" + dai.toFixed(2);
    document.getElementById('rV').textContent = "$" + iva.toFixed(2);
    document.getElementById('rA').textContent = "$" + aiv.toFixed(2);
    document.getElementById('rM').textContent = "$" + mat.toFixed(2);
    document.getElementById('rT').textContent = "TOTAL: $" + total.toLocaleString('en-US', {minimumFractionDigits: 2});
    document.getElementById('res').style.display = 'block';
}
</script>
</body>
</html>
